<script>
(function () {
  var link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://axoloassist.com/cdn/accessflow.css';
  document.head.appendChild(link);
})();
</script>

<div id="accessflow-config"
  data-position="{{position}}"
  data-accent-color="{{accentColor}}"
  data-features-json="{{featuresJson}}"></div>

<script>
(function () {
  var el = document.getElementById('accessflow-config');
  if (!el) return;
  var features = {};
  try {
    features = JSON.parse(el.getAttribute('data-features-json') || '{}');
  } catch (e) {}
  window.AccessFlowConfig = {
    position: el.getAttribute('data-position') || 'bottom-right',
    accentColor: el.getAttribute('data-accent-color') || '#B03060',
    features: features,
    iconUrl: 'https://axoloassist.com/cdn/accessibility.png',
    fontBaseUrl: 'https://axoloassist.com/cdn/fonts/',
    storageKey: 'accessflow-wix-settings-v1'
  };
})();
</script>

<div class="axolo-toolbar-root" id="axoloAssistToolbarRoot" data-position="{{position}}">
  <button class="a11y-toggle" id="a11yToggle" type="button" aria-label="Open accessibility settings" aria-expanded="false" aria-controls="a11yPanel">
    <img src="https://axoloassist.com/cdn/accessibility.png" alt="" width="60" height="60" aria-hidden="true" />
  </button>
  <div class="a11y-overlay" id="a11yOverlay" aria-hidden="true"></div>
  <aside class="a11y-panel" id="a11yPanel" role="dialog" aria-labelledby="a11yTitle" aria-modal="true" tabindex="-1">
    <div class="a11y-panel-header">
      <h2 id="a11yTitle">Accessibility</h2>
      <button class="a11y-close" id="a11yClose" type="button" aria-label="Close accessibility settings">✕</button>
    </div>
    <div class="a11y-group" data-feature="text_size">
      <h3>Text Size</h3>
      <div class="a11y-options" role="group" aria-label="Text size">
        <button class="a11y-btn" type="button" data-setting="text-size" data-value="default" aria-pressed="true">A</button>
        <button class="a11y-btn" type="button" data-setting="text-size" data-value="lg" aria-pressed="false" style="font-size:0.95rem;">A+</button>
        <button class="a11y-btn" type="button" data-setting="text-size" data-value="xl" aria-pressed="false" style="font-size:1.05rem;">A++</button>
        <button class="a11y-btn" type="button" data-setting="text-size" data-value="xxl" aria-pressed="false" style="font-size:1.15rem;">A+++</button>
      </div>
    </div>
    <div class="a11y-group" data-feature="line_spacing">
      <h3>Line Spacing</h3>
      <div class="a11y-options" role="group" aria-label="Line spacing">
        <button class="a11y-btn" type="button" data-setting="line-spacing" data-value="default" aria-pressed="true">Normal</button>
        <button class="a11y-btn" type="button" data-setting="line-spacing" data-value="wide" aria-pressed="false">Wide</button>
        <button class="a11y-btn" type="button" data-setting="line-spacing" data-value="wider" aria-pressed="false">Wider</button>
      </div>
    </div>
    <div class="a11y-group" data-feature="letter_spacing">
      <h3>Letter Spacing</h3>
      <div class="a11y-options" role="group" aria-label="Letter spacing">
        <button class="a11y-btn" type="button" data-setting="letter-spacing" data-value="default" aria-pressed="true">Normal</button>
        <button class="a11y-btn" type="button" data-setting="letter-spacing" data-value="wide" aria-pressed="false">Wide</button>
        <button class="a11y-btn" type="button" data-setting="letter-spacing" data-value="wider" aria-pressed="false">Wider</button>
      </div>
    </div>
    <div class="a11y-group" data-feature="word_spacing">
      <h3>Word Spacing</h3>
      <div class="a11y-options" role="group" aria-label="Word spacing">
        <button class="a11y-btn" type="button" data-setting="word-spacing" data-value="default" aria-pressed="true">Normal</button>
        <button class="a11y-btn" type="button" data-setting="word-spacing" data-value="wide" aria-pressed="false">Wide</button>
        <button class="a11y-btn" type="button" data-setting="word-spacing" data-value="wider" aria-pressed="false">Wider</button>
      </div>
    </div>
    <div class="a11y-group" data-feature="font">
      <h3>Font</h3>
      <div class="a11y-options" role="group" aria-label="Font choice">
        <button class="a11y-btn" type="button" data-setting="font" data-value="default" aria-pressed="true">Default</button>
        <button class="a11y-btn" type="button" data-setting="font" data-value="dyslexia" aria-pressed="false">Dyslexia-friendly</button>
      </div>
    </div>
    <div class="a11y-group" data-feature="text_align">
      <h3>Text Align</h3>
      <div class="a11y-options" role="group" aria-label="Text alignment">
        <button class="a11y-btn" type="button" data-setting="text-align" data-value="default" aria-pressed="true">Left</button>
        <button class="a11y-btn" type="button" data-setting="text-align" data-value="center" aria-pressed="false">Center</button>
        <button class="a11y-btn" type="button" data-setting="text-align" data-value="justify" aria-pressed="false">Justify</button>
      </div>
    </div>
    <div class="a11y-group" data-feature="readable_width">
      <h3>Content Width</h3>
      <div class="a11y-options" role="group" aria-label="Content width">
        <button class="a11y-btn" type="button" data-setting="readable-width" data-value="default" aria-pressed="true">Full</button>
        <button class="a11y-btn" type="button" data-setting="readable-width" data-value="narrow" aria-pressed="false">Narrow</button>
        <button class="a11y-btn" type="button" data-setting="readable-width" data-value="wide" aria-pressed="false">Wide</button>
      </div>
      <p class="aat-group-hint">Narrows content columns for easier reading</p>
    </div>
    <div class="a11y-group" data-feature="contrast">
      <h3>Contrast</h3>
      <div class="a11y-options" role="group" aria-label="Contrast mode">
        <button class="a11y-btn" type="button" data-setting="contrast" data-value="default" aria-pressed="true">Normal</button>
        <button class="a11y-btn" type="button" data-setting="contrast" data-value="dark" aria-pressed="false">Dark</button>
        <button class="a11y-btn" type="button" data-setting="contrast" data-value="high" aria-pressed="false">High</button>
      </div>
    </div>
    <div class="a11y-group" data-feature="color_filter">
      <h3>Color Filter</h3>
      <div class="a11y-options" role="group" aria-label="Color filter">
        <button class="a11y-btn" type="button" data-setting="saturation" data-value="default" aria-pressed="true">None</button>
        <button class="a11y-btn" type="button" data-setting="saturation" data-value="grayscale" aria-pressed="false">Gray</button>
        <button class="a11y-btn" type="button" data-setting="saturation" data-value="sepia" aria-pressed="false">Muted</button>
        <button class="a11y-btn" type="button" data-setting="saturation" data-value="inverted" aria-pressed="false">Invert</button>
      </div>
    </div>
    <div class="a11y-group" data-feature="reading_motion">
      <h3>Reading &amp; Motion</h3>
      <div class="a11y-toggle-row" data-feature="underline_links">
        <label for="sw-underline-links">Underline links</label>
        <button class="a11y-switch" id="sw-underline-links" type="button" data-toggle="underline-links" role="switch" aria-checked="false" aria-label="Underline all links"></button>
      </div>
      <div class="a11y-toggle-row" data-feature="enhanced_focus">
        <label for="sw-enhanced-focus">Enhanced focus</label>
        <button class="a11y-switch" id="sw-enhanced-focus" type="button" data-toggle="enhanced-focus" role="switch" aria-checked="false" aria-label="Enhanced focus indicators"></button>
      </div>
      <div class="a11y-toggle-row" data-feature="highlight_headings">
        <label for="sw-highlight-headings">Highlight headings</label>
        <button class="a11y-switch" id="sw-highlight-headings" type="button" data-toggle="highlight-headings" role="switch" aria-checked="false" aria-label="Highlight headings"></button>
      </div>
      <div class="a11y-toggle-row" data-feature="reading_guide">
        <label for="sw-reading-guide">Reading guide</label>
        <button class="a11y-switch" id="sw-reading-guide" type="button" data-toggle="reading-guide" role="switch" aria-checked="false" aria-label="Reading guide bar that follows the cursor"></button>
      </div>
      <div class="a11y-toggle-row" data-feature="link_highlight">
        <label for="sw-link-highlight">Highlight links</label>
        <button class="a11y-switch" id="sw-link-highlight" type="button" data-toggle="link-highlight" role="switch" aria-checked="false" aria-label="Highlight all links with a yellow background"></button>
      </div>
      <div class="a11y-toggle-row" data-feature="keyboard_nav">
        <label for="sw-keyboard-nav">Keyboard nav helper</label>
        <button class="a11y-switch" id="sw-keyboard-nav" type="button" data-toggle="keyboard-nav" role="switch" aria-checked="false" aria-label="Highlight the focused element clearly for keyboard users"></button>
      </div>
      <div class="a11y-toggle-row" data-feature="reduce_motion">
        <label for="sw-reduce-motion">Reduce motion</label>
        <button class="a11y-switch" id="sw-reduce-motion" type="button" data-toggle="reduce-motion" role="switch" aria-checked="false" aria-label="Reduce motion and animations"></button>
      </div>
      <div class="a11y-toggle-row" data-feature="pause_animations">
        <label for="sw-pause-animations">Pause animations</label>
        <button class="a11y-switch" id="sw-pause-animations" type="button" data-toggle="pause-animations" role="switch" aria-checked="false" aria-label="Pause all animations"></button>
      </div>
      <div class="a11y-toggle-row" data-feature="big_cursor">
        <label for="sw-big-cursor">Large cursor</label>
        <button class="a11y-switch" id="sw-big-cursor" type="button" data-toggle="big-cursor" role="switch" aria-checked="false" aria-label="Enlarge cursor"></button>
      </div>
    </div>
    <button class="a11y-reset" id="a11yReset" type="button">Reset all settings</button>
  </aside>
</div>

<script>
(function () {
  'use strict';

  var CDN = 'https://axoloassist.com/cdn';
  var pageConfig = window.AccessFlowConfig || {};
  var STORAGE_KEY = pageConfig.storageKey || 'accessflow-wix-settings-v1';
  var root = document.documentElement;

  var toggleBtn = document.getElementById('a11yToggle');
  var panel = document.getElementById('a11yPanel');
  var overlay = document.getElementById('a11yOverlay');
  var closeBtn = document.getElementById('a11yClose');
  var resetBtn = document.getElementById('a11yReset');
  var toolbarRoot = document.getElementById('axoloAssistToolbarRoot');

  if (!toggleBtn || !panel || !overlay || !closeBtn || !resetBtn || !toolbarRoot) {
    return;
  }

  var iconUrl = pageConfig.iconUrl || CDN + '/accessibility.png';
  var fontBaseUrl = pageConfig.fontBaseUrl || CDN + '/fonts/';
  var accentColor = pageConfig.accentColor || '#B03060';

  var icon = toggleBtn.querySelector('img');
  if (icon) {
    icon.src = iconUrl;
  }

  if (pageConfig.position) {
    toolbarRoot.setAttribute('data-position', pageConfig.position);
  }

  function hexToRgb(hex) {
    hex = String(hex).replace('#', '');
    if (hex.length === 3) {
      hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
    }
    return (
      parseInt(hex.substring(0, 2), 16) +
      ', ' +
      parseInt(hex.substring(2, 4), 16) +
      ', ' +
      parseInt(hex.substring(4, 6), 16)
    );
  }

  function applyAccent(color) {
    var rgb = hexToRgb(color);
    var styleId = 'accessflow-accent-vars';
    var existing = document.getElementById(styleId);
    if (existing) {
      existing.remove();
    }
    var style = document.createElement('style');
    style.id = styleId;
    style.textContent =
      '.axolo-toolbar-root{--aat-accent:' +
      color +
      ';--aat-accent-deep:' +
      color +
      ';--aat-accent-rgb:' +
      rgb +
      ';--aat-accent-tint:rgba(' +
      rgb +
      ',0.12);--aat-accent-tint2:rgba(' +
      rgb +
      ',0.28);}';
    document.head.appendChild(style);
  }

  applyAccent(accentColor);

  var featureMap = {
    textSize: 'text_size',
    lineSpacing: 'line_spacing',
    letterSpacing: 'letter_spacing',
    wordSpacing: 'word_spacing',
    font: 'font',
    textAlign: 'text_align',
    contrast: 'contrast',
    colorFilter: 'color_filter',
    readableWidth: 'readable_width',
    linkHighlight: 'link_highlight',
    underlineLinks: 'underline_links',
    enhancedFocus: 'enhanced_focus',
    highlightHeadings: 'highlight_headings',
    readingGuide: 'reading_guide',
    keyboardNav: 'keyboard_nav',
    reduceMotion: 'reduce_motion',
    pauseAnimations: 'pause_animations',
    bigCursor: 'big_cursor'
  };

  function applyFeatureVisibility(features) {
    if (!features || typeof features !== 'object') {
      return;
    }
    Object.keys(featureMap).forEach(function (key) {
      if (features[key] === false) {
        toolbarRoot
          .querySelectorAll('[data-feature="' + featureMap[key] + '"]')
          .forEach(function (el) {
            el.classList.add('aaf-hidden');
          });
      }
    });
  }

  applyFeatureVisibility(pageConfig.features);

  var fontStyleId = 'accessflow-dyslexia-fonts';
  if (!document.getElementById(fontStyleId)) {
    var fontStyle = document.createElement('style');
    fontStyle.id = fontStyleId;
    fontStyle.textContent =
      "@font-face{font-family:'OpenDyslexic';font-style:normal;font-weight:400;font-display:swap;src:url('" +
      fontBaseUrl +
      "opendyslexic-7.woff') format('woff');}" +
      "@font-face{font-family:'OpenDyslexic';font-style:normal;font-weight:700;font-display:swap;src:url('" +
      fontBaseUrl +
      "opendyslexic-8.woff') format('woff');}";
    document.head.appendChild(fontStyle);
  }

  var defaults = {
    'text-size': 'default',
    'line-spacing': 'default',
    'letter-spacing': 'default',
    'word-spacing': 'default',
    font: 'default',
    'text-align': 'default',
    'readable-width': 'default',
    contrast: 'default',
    saturation: 'default',
    'underline-links': 'off',
    'enhanced-focus': 'off',
    'highlight-headings': 'off',
    'reading-guide': 'off',
    'link-highlight': 'off',
    'keyboard-nav': 'off',
    'reduce-motion': 'off',
    'pause-animations': 'off',
    'big-cursor': 'off'
  };

  var settings;
  try {
    settings = Object.assign({}, defaults, JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'));
  } catch (e) {
    settings = Object.assign({}, defaults);
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    } catch (err) {
      /* ignore */
    }
  }

  function apply() {
    Object.keys(defaults).forEach(function (key) {
      var val = settings[key];
      if (val === 'default' || val === 'off' || val === undefined) {
        root.removeAttribute('data-' + key);
      } else {
        root.setAttribute('data-' + key, val);
      }
    });
    setupReadingGuide();
  }

  function syncUI() {
    document.querySelectorAll('.a11y-btn[data-setting]').forEach(function (btn) {
      var active = settings[btn.dataset.setting] === btn.dataset.value;
      btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
    document.querySelectorAll('.a11y-switch[data-toggle]').forEach(function (sw) {
      sw.setAttribute('aria-checked', settings[sw.dataset.toggle] === 'on' ? 'true' : 'false');
    });
  }

  function checkBadge() {
    var count = 0;
    Object.keys(defaults).forEach(function (key) {
      if (settings[key] !== defaults[key]) {
        count += 1;
      }
    });
    if (count > 0) {
      toggleBtn.classList.add('aat-has-settings');
    } else {
      toggleBtn.classList.remove('aat-has-settings');
    }
  }

  function afterChange() {
    save();
    apply();
    syncUI();
    checkBadge();
  }

  document.querySelectorAll('.a11y-btn[data-setting]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      settings[btn.dataset.setting] = btn.dataset.value;
      afterChange();
    });
  });

  document.querySelectorAll('.a11y-switch[data-toggle]').forEach(function (sw) {
    sw.addEventListener('click', function () {
      var key = sw.dataset.toggle;
      settings[key] = settings[key] === 'on' ? 'off' : 'on';
      afterChange();
    });
  });

  resetBtn.addEventListener('click', function () {
    settings = Object.assign({}, defaults);
    afterChange();
    var orig = resetBtn.textContent;
    resetBtn.textContent = '✓ All reset';
    resetBtn.disabled = true;
    setTimeout(function () {
      resetBtn.textContent = orig;
      resetBtn.disabled = false;
    }, 1500);
  });

  function openPanel() {
    panel.classList.add('open');
    overlay.classList.add('open');
    root.classList.add('a11y-locked');
    toggleBtn.setAttribute('aria-expanded', 'true');
    overlay.setAttribute('aria-hidden', 'false');
    setTimeout(function () {
      panel.focus();
    }, 50);
  }

  function closePanel() {
    panel.classList.remove('open');
    overlay.classList.remove('open');
    root.classList.remove('a11y-locked');
    toggleBtn.setAttribute('aria-expanded', 'false');
    overlay.setAttribute('aria-hidden', 'true');
    toggleBtn.focus();
  }

  toggleBtn.addEventListener('click', function () {
    if (panel.classList.contains('open')) {
      closePanel();
    } else {
      openPanel();
    }
  });

  closeBtn.addEventListener('click', closePanel);
  overlay.addEventListener('click', closePanel);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && panel.classList.contains('open')) {
      closePanel();
    }
    if (e.key !== 'Tab' || !panel.classList.contains('open')) {
      return;
    }
    var focusable = Array.prototype.slice
      .call(
        panel.querySelectorAll(
          'button, a[href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
        )
      )
      .filter(function (el) {
        return !el.disabled;
      });
    if (!focusable.length) {
      return;
    }
    var first = focusable[0];
    var last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  });

  var guideEl = null;

  function moveGuide(e) {
    if (guideEl) {
      guideEl.style.top = e.clientY - 22 + 'px';
    }
  }

  function setupReadingGuide() {
    if (settings['reading-guide'] === 'on') {
      if (!guideEl) {
        guideEl = document.createElement('div');
        guideEl.className = 'a11y-reading-guide';
        guideEl.setAttribute('aria-hidden', 'true');
        document.body.appendChild(guideEl);
        document.addEventListener('mousemove', moveGuide);
      }
    } else if (guideEl) {
      document.removeEventListener('mousemove', moveGuide);
      guideEl.remove();
      guideEl = null;
    }
  }

  apply();
  syncUI();
  checkBadge();

  setTimeout(function () {
    toggleBtn.classList.add('aat-loaded');
  }, 600);
})();

</script>
